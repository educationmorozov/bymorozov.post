
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акселератор - Генератор каруселей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Science+Gothic:wght@100..900&family=Shantel+Sans:wght@300..800&family=Victor+Mono:wght@100..700&family=LXGW+WenKai+Mono+TC&family=Rubik:wght@400;700;900&family=Inter:wght@400;700;900&family=Manrope:wght@400;700&family=Montserrat:wght@400;700;900&family=DM+Sans:wght@400;700&family=Golos+Text:wght@400;700;900&family=Unbounded:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Oswald:wght@400;700&family=Rubik+Mono+One&family=Russo+One&family=Stalinist+One&family=Kelly+Slab&family=Tenor+Sans&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&family=Lato:wght@400;700&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&family=PT+Sans:wght@400;700&family=PT+Serif:wght@400;700&family=Lora:wght@400;700&family=Noto+Sans:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Mulish:wght@400;700&family=Vollkorn:wght@400;700&family=Nunito+Sans:wght@400;700&family=Instrument+Sans:wght@400;700&family=Nunito:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .iphone-mockup {
            width: 320px;
            height: 650px;
            border: 10px solid #1f1f1f;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .carousel-snap {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .carousel-snap::-webkit-scrollbar { display: none; }
        .carousel-snap > div {
            flex: 0 0 100%;
            scroll-snap-align: start;
        }
        .dynamic-island {
            width: 80px;
            height: 20px;
            background: #000;
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
